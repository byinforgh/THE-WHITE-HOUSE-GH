<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The White House Koforidua — Bar Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--surface:#111111;--card:#181818;--border:#2a2a2a;--gold:#f5a623;--gold-dim:#c9861a;--teal:#3fb6a8;--red:#ef4444;--green:#22c55e;--text:#f2f2f2;--text-dim:#b5b5b5;--muted:#888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
.logo{font-size:18px;font-weight:800;letter-spacing:1px;color:var(--gold);}
.logo span{color:var(--text-dim);font-weight:400;font-size:11px;display:block;letter-spacing:2px;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:14px;}
.last-refresh{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}
.refresh-btn{background:var(--border);border:none;color:var(--text);padding:8px 16px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1px;font-family:'Syne',sans-serif;}
.refresh-btn:hover{background:var(--gold);color:var(--black);}
.main{padding:20px 24px;max-width:1300px;margin:0 auto;}
.low-stock-banner{display:none;background:#2a0a0a;border:1px solid var(--red);border-radius:8px;padding:16px 20px;margin-bottom:20px;}
.low-stock-banner.active{display:block;}
.low-stock-banner-title{color:var(--red);font-weight:800;font-size:13px;letter-spacing:1px;margin-bottom:8px;}
.low-stock-pill{display:inline-block;background:#3a1010;border:1px solid var(--red);color:#ffb3b3;padding:5px 12px;border-radius:20px;font-size:12px;margin:3px 4px 0 0;font-family:'Space Mono',monospace;}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;position:relative;overflow:hidden;}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.metric-card.gold::before{background:var(--gold);}.metric-card.teal::before{background:var(--teal);}.metric-card.red::before{background:var(--red);}.metric-card.green::before{background:var(--green);}
.metric-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:8px;}
.metric-value{font-size:30px;font-weight:800;font-family:'Space Mono',monospace;line-height:1;}
.metric-card.gold .metric-value{color:var(--gold);}.metric-card.teal .metric-value{color:var(--teal);}.metric-card.red .metric-value{color:var(--red);}.metric-card.green .metric-value{color:var(--green);}
.metric-sub{font-size:11px;color:var(--text-dim);margin-top:6px;}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:16px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:14px;text-transform:uppercase;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 10px;color:var(--muted);font-weight:700;letter-spacing:1px;border-bottom:1px solid var(--border);font-size:10px;}
td{padding:7px 10px;border-bottom:1px solid #1a1a1a;}
tr.low-row td{color:var(--red);}
tr.low-row{background:#1a0a0a;}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;width:100%;margin-bottom:10px;outline:none;}
.search-input:focus{border-color:var(--gold);}
.btn{background:var(--gold);color:var(--black);border:none;padding:10px 18px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:800;letter-spacing:1px;font-family:'Syne',sans-serif;width:100%;}
.btn:hover{background:var(--gold-dim);}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:12px;}
.loading{text-align:center;padding:24px;color:var(--muted);font-size:12px;font-family:'Space Mono',monospace;}
.customer-result{background:var(--surface);border:1px solid var(--teal);border-radius:6px;padding:12px 14px;margin-top:10px;font-size:12px;line-height:1.7;display:none;}
.customer-result.show{display:block;}
.customer-result b{color:var(--teal);}
.restock-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.scroll-table{max-height:420px;overflow-y:auto;}
.badge-unit{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">THE WHITE HOUSE KOFORIDUA <span>BAR DASHBOARD</span></div>
  <div class="header-right"><span class="last-refresh" id="lastRefresh">Loading...</span><button class="refresh-btn" onclick="loadData()">&#8635; REFRESH</button></div>
</div>

<div class="main">
  <div class="low-stock-banner" id="lowStockBanner">
    <div class="low-stock-banner-title">&#9888; LOW STOCK — RESTOCK NEEDED</div>
    <div id="lowStockPills"></div>
  </div>

  <div class="metrics-grid" id="topMetrics"><div class="loading">Loading bar data</div></div>

  <div class="two-col">
    <div>
      <div class="card">
        <div class="card-title">&#128203; TODAY'S ORDERS</div>
        <div class="scroll-table"><table><thead><tr><th>TIME</th><th>ITEM</th><th>QTY</th><th>TOTAL</th><th>STAFF</th><th>CUSTOMER</th></tr></thead><tbody id="ordersBody"></tbody></table></div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-title">&#128100; CUSTOMER LOOKUP</div>
        <input class="search-input" id="custPhoneInput" placeholder="Enter customer number..." onkeydown="if(event.key==='Enter')lookupCustomer()">
        <button class="btn" onclick="lookupCustomer()">LOOK UP</button>
        <div class="customer-result" id="customerResult"></div>
      </div>
      <div class="card">
        <div class="card-title">&#128230; RESTOCK AN ITEM</div>
        <input class="search-input" id="restockItem" placeholder="Item name (must match Bar Stock exactly)">
        <div class="restock-grid">
          <input class="search-input" id="restockQty" type="number" placeholder="Qty to add" style="margin:0">
          <input class="search-input" id="restockPar" type="number" placeholder="Par level (optional)" style="margin:0">
        </div>
        <input class="search-input" id="restockCost" type="number" placeholder="Cost per unit (optional)">
        <button class="btn" onclick="submitRestock()">+ ADD STOCK</button>
        <div id="restockResult" style="margin-top:8px;font-size:12px"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">&#128230; BAR STOCK — ALL ITEMS <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0">(red rows = at or below par level)</span></div>
    <input class="search-input" id="stockSearch" placeholder="Search stock..." oninput="renderStock()">
    <div class="scroll-table"><table><thead><tr><th>ITEM</th><th>UNIT</th><th>CURRENT QTY</th><th>PAR LEVEL</th><th>COST/UNIT</th><th>LAST RESTOCKED</th></tr></thead><tbody id="stockBody"></tbody></table></div>
  </div>
</div>

<script>
// Fill this in once the Bar system's Apps Script web app is deployed
// (Deploy > New deployment > Web app > copy the /exec URL).
const API_URL = 'https://script.google.com/macros/s/AKfycbyycYKCEtRchk0eToXIlMLgs3RmWIsKuUppD3UprPO8zLi9N5a9PIgn9uN4IKeip24E/exec';
let barData = {stock: [], todayOrders: []};

async function loadData(){
  document.getElementById('lastRefresh').textContent = 'Refreshing...';
  try{
    const res = await fetch(API_URL + '?action=getBarData&t=' + Date.now());
    const data = await res.json();
    if(!data.success) throw new Error(data.error || 'Unknown error');
    barData = data;
    document.getElementById('lastRefresh').textContent = 'Updated: ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    renderMetrics();
    renderLowStockBanner();
    renderOrders();
    renderStock();
  }catch(e){
    document.getElementById('lastRefresh').textContent = 'Offline — check connection';
    console.log('Load error:', e.message);
  }
}

function renderMetrics(){
  document.getElementById('topMetrics').innerHTML = `
    <div class="metric-card gold"><div class="metric-label">TODAY'S REVENUE</div><div class="metric-value">&#8373;${(barData.todayRevenue||0).toFixed(2)}</div><div class="metric-sub">${(barData.todayItemCount||0)} items sold</div></div>
    <div class="metric-card teal"><div class="metric-label">ORDERS TODAY</div><div class="metric-value">${(barData.todayOrders||[]).length}</div><div class="metric-sub">logged sales</div></div>
    <div class="metric-card red"><div class="metric-label">LOW STOCK ITEMS</div><div class="metric-value">${barData.lowStockCount||0}</div><div class="metric-sub">at or below par</div></div>
    <div class="metric-card green"><div class="metric-label">MENU ITEMS</div><div class="metric-value">${(barData.menu||[]).length}</div><div class="metric-sub">cocktails + straight-sell</div></div>`;
}

function renderLowStockBanner(){
  const low = (barData.stock||[]).filter(s=>s.lowStock);
  const banner = document.getElementById('lowStockBanner');
  if(low.length===0){ banner.classList.remove('active'); return; }
  banner.classList.add('active');
  document.getElementById('lowStockPills').innerHTML = low.map(s=>`<span class="low-stock-pill">${s.item} — ${s.currentQty}${s.unit==='oz'?'oz':' left'}</span>`).join('');
}

function renderOrders(){
  const orders = barData.todayOrders || [];
  if(orders.length===0){ document.getElementById('ordersBody').innerHTML = '<tr><td colspan="6" class="empty">No orders logged yet today</td></tr>'; return; }
  document.getElementById('ordersBody').innerHTML = orders.map(o=>{
    const t = new Date(o.timestamp);
    const timeStr = isNaN(t.getTime()) ? '—' : t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return `<tr><td style="font-family:'Space Mono',monospace;font-size:11px">${timeStr}</td><td>${o.item}</td><td>${o.qty}</td><td style="color:var(--gold);font-weight:700">&#8373;${o.lineTotal.toFixed(2)}</td><td>${o.staffInitials||'—'}</td><td style="font-family:'Space Mono',monospace;font-size:11px">${o.custId&&o.custId!=='—'?o.custId:'walk-in'}</td></tr>`;
  }).join('');
}

function renderStock(){
  const q = (document.getElementById('stockSearch').value||'').toLowerCase();
  const stock = (barData.stock||[]).filter(s=>!q||s.item.toLowerCase().includes(q));
  if(stock.length===0){ document.getElementById('stockBody').innerHTML = '<tr><td colspan="6" class="empty">No stock items match</td></tr>'; return; }
  document.getElementById('stockBody').innerHTML = stock.map(s=>`
    <tr class="${s.lowStock?'low-row':''}">
      <td>${s.item}</td>
      <td class="badge-unit">${s.unit}</td>
      <td style="font-family:'Space Mono',monospace">${s.currentQty}</td>
      <td style="font-family:'Space Mono',monospace">${s.parLevel}</td>
      <td style="font-family:'Space Mono',monospace">&#8373;${s.costPerUnit.toFixed(2)}</td>
      <td style="font-size:11px;color:var(--text-dim)">${s.lastRestocked||'—'}</td>
    </tr>`).join('');
}

async function lookupCustomer(){
  const phone = document.getElementById('custPhoneInput').value.trim();
  const resultEl = document.getElementById('customerResult');
  if(!phone){ resultEl.classList.remove('show'); return; }
  resultEl.classList.add('show');
  resultEl.innerHTML = 'Looking up...';
  try{
    const res = await fetch(API_URL + '?action=getCustomer&phone=' + encodeURIComponent(phone) + '&t=' + Date.now());
    const data = await res.json();
    if(!data.success) throw new Error(data.error||'Lookup failed');
    if(!data.found){
      resultEl.innerHTML = 'No customer found with that number — they\\'ll be registered next time they order.';
    }else{
      resultEl.innerHTML = `<b>${data.custId}</b> — ${data.name}<br>Phone: ${data.phone}<br>Total visits: ${data.totalVisits}<br>Last visit: ${data.lastVisit||'—'}`;
    }
  }catch(e){
    resultEl.innerHTML = 'Connection error — try again.';
  }
}

async function submitRestock(){
  const item = document.getElementById('restockItem').value.trim();
  const qtyAdded = document.getElementById('restockQty').value;
  const parLevel = document.getElementById('restockPar').value;
  const costPerUnit = document.getElementById('restockCost').value;
  const resultEl = document.getElementById('restockResult');
  if(!item || !qtyAdded){ resultEl.innerHTML = '<span style="color:var(--red)">Item name and quantity are required.</span>'; return; }
  resultEl.innerHTML = 'Saving...';
  try{
    let url = API_URL + '?action=addBarStock&item=' + encodeURIComponent(item) + '&qtyAdded=' + encodeURIComponent(qtyAdded);
    if(parLevel) url += '&parLevel=' + encodeURIComponent(parLevel);
    if(costPerUnit) url += '&costPerUnit=' + encodeURIComponent(costPerUnit);
    url += '&t=' + Date.now();
    const res = await fetch(url);
    const data = await res.json();
    if(!data.success) throw new Error(data.error||'Could not restock');
    resultEl.innerHTML = `<span style="color:var(--green)">&#10003; ${item} — new qty: ${data.newQty}${data.newItem?' (new item created)':''}</span>`;
    document.getElementById('restockItem').value = '';
    document.getElementById('restockQty').value = '';
    document.getElementById('restockPar').value = '';
    document.getElementById('restockCost').value = '';
    loadData();
  }catch(e){
    resultEl.innerHTML = '<span style="color:var(--red)">' + (e.message||'Error') + '</span>';
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
